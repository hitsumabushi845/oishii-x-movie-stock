name: update-data

on:
  schedule:
    - cron: "0 18 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Run groups one at a time so we never fire several search/all requests
      # at the same instant — the endpoint rate-limits aggressively (429).
      max-parallel: 1
      matrix:
        group: [aimai, shokuzai, mizutama, oishii_inc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          python-version: "3.12"
      - name: Install
        working-directory: scraper
        run: uv sync --frozen
      - name: Run scraper for ${{ matrix.group }}
        working-directory: scraper
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          uv run python -m scraper \
            --group ${{ matrix.group }} \
            --manifest ../data/groups.json \
            --manifest-schema ../schema/groups.schema.json \
            --schema ../schema/videos.schema.json \
            --data-dir ../data \
            --require-existing \
            --summary-out "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: data-${{ matrix.group }}
          path: data/${{ matrix.group }}.json
          retention-days: 1

  open-pr:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: _artifacts
      - name: Stage updated per-group files
        run: |
          set -e
          if [ -d _artifacts ]; then
            for f in _artifacts/data-*/*.json; do
              [ -e "$f" ] || continue
              cp "$f" data/
            done
          fi
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: "chore(data): update per-group videos.json"
          title: "chore(data): weekly per-group videos.json update"
          body: |
            Auto-generated by `update-data.yml`.

            See workflow run summary for per-group scrape stats.
          branch: bot/update-data
          delete-branch: true
          add-paths: data/*.json
      - name: Notify Slack on failure
        if: ${{ failure() || needs.scrape.result == 'failure' }}
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        with:
          payload: |
            {
              "text": ":x: update-data failed: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run #${{ github.run_id }}>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
