name: update-data

on:
  schedule:
    - cron: "0 18 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Install
        working-directory: scraper
        run: uv sync --frozen
      - name: Run scraper
        working-directory: scraper
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          uv run python -m scraper \
            --data-file ../data/videos.json \
            --schema ../schema/videos.schema.json \
            --require-existing \
            --summary-out "$GITHUB_STEP_SUMMARY"
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- data/videos.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(data): update videos.json"
          title: "chore(data): weekly videos.json update"
          body: |
            Auto-generated by `update-data.yml`.

            See workflow run summary for scrape stats.
          branch: bot/update-data
          delete-branch: true
          add-paths: |
            data/videos.json
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: update-data failed: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run #${{ github.run_id }}>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
